AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Cloud Resume Challenge - Ali Ahmed

Globals:
  Function:
    Timeout: 3
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "*"
      AllowHeaders:
        - "Content-Type"
      AllowMethods:
        - "GET"
        - "POST"
        - "OPTIONS"

Resources:
  VisitorCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: visitor_counter/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: visitor-count
      Events:
        VisitorCount:
          Type: HttpApi
          Properties:
            Path: /count
            Method: get

  VisitorCountTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: visitor-count
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ContactFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: contact_form/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        ContactForm:
          Type: HttpApi
          Properties:
            Path: /contact
            Method: post
        ContactFormOptions:
          Type: HttpApi
          Properties:
            Path: /contact
            Method: options

Outputs:
  VisitorCountApi:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/count"
  VisitorCountFunction:
    Description: "Visitor Counter Lambda Function ARN"
    Value: !GetAtt VisitorCountFunction.Arn
  ContactFormApi:
    Description: "Contact form API endpoint"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/contact"