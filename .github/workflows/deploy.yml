name: Deploy Cloud Resume

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/test_lambda.py -v
        env:
          AWS_DEFAULT_REGION: eu-north-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Build SAM
        run: sam build

      - name: Deploy SAM
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Deploy frontend to S3
        run: |
          aws s3 cp index.html s3://ali-ahmed-cv-529253088987-eu-north-1-an/index.html

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E3NCYMXG3YTBNG --paths "/*"